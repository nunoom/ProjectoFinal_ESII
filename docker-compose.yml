version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: eha-postgres
    environment:
      POSTGRES_DB: eha
      POSTGRES_USER: eha
      POSTGRES_PASSWORD: eha2026
    ports:
      - "5432:5432"
    volumes:
      - eha_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eha"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  eha_pgdata:
