server:
  port: 8087

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:notification_db}
    username: ${POSTGRES_USER:eha}
    password: ${POSTGRES_PASSWORD:eha_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    protocol: smtp
    test-connection: false
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

# App Config
app:
  mail:
    from: ${MAIL_FROM:noreply@eha.ao}
    from-name: ${MAIL_FROM_NAME:EHA - Economia com História Angola}
  url:
    frontend: ${FRONTEND_URL:http://localhost:3000}
    backend: ${BACKEND_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
