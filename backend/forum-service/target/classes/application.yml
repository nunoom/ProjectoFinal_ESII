server:
  port: 8086

spring:
  application:
    name: forum-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:forum_db}
    username: ${POSTGRES_USER:eha}
    password: ${POSTGRES_PASSWORD:eha_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
