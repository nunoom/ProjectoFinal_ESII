server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 100
            key-resolver: "#{@ipKeyResolver}"
      routes:
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
        - id: content-service
          uri: http://content-service:8083
          predicates:
            - Path=/api/contents/**
        - id: quiz-service
          uri: http://quiz-service:8084
          predicates:
            - Path=/api/quizzes/**
        - id: gamification-service
          uri: http://gamification-service:8085
          predicates:
            - Path=/api/gamification/**
            - Path=/api/ranking/**
        - id: forum-service
          uri: http://forum-service:8086
          predicates:
            - Path=/api/forum/**
        - id: notification-service
          uri: http://notification-service:8087
          predicates:
            - Path=/api/notifications/**
        - id: backoffice-service
          uri: http://backoffice-service:8088
          predicates:
            - Path=/api/admin/**
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:change-me}

cors:
  allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
