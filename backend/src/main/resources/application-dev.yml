# Perfil de desenvolvimento: H2 em memória — arranca sem dependências externas.
# Para PostgreSQL (como documentado), usar o perfil "postgres": mvn spring-boot:run -Dspring-boot.run.profiles=postgres
spring:
  datasource:
    url: jdbc:h2:mem:eha;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
  h2:
    console:
      enabled: true
      path: /h2-console
